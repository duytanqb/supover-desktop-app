appId: com.supover.app
productName: Supover App
copyright: Copyright © 2026

asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/bindings/**"
  - "node_modules/file-uri-to-path/**"

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - "!node_modules/better-sqlite3/build/Release/obj/**"
  - "!node_modules/better-sqlite3/build/Release/*.o"
  - "!node_modules/better-sqlite3/build/Release/.deps"
  - "!node_modules/better-sqlite3/deps/**"
  - "!node_modules/better-sqlite3/src/**"
  - "!node_modules/better-sqlite3/prebuilds/**"
  - "!**/{test,tests,__tests__}/**"
  - "!**/*.{md,ts,map}"

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.business
  darkModeSupport: true
  identity: null

dmg:
  artifactName: "${productName}-${version}-${arch}.dmg"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-Setup.exe"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
