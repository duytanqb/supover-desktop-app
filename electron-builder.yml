appId: com.supover.app
productName: Supover App
copyright: Copyright © 2026

asar: true

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - "!node_modules/**/*"

extraResources:
  - from: node_modules/better-sqlite3/build/Release
    to: better-sqlite3/build/Release
    filter:
      - "*.node"

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.business
  darkModeSupport: true
  identity: null

dmg:
  artifactName: "${productName}-${version}-${arch}.dmg"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-Setup.exe"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
